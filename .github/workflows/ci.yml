name: CI

on:
  push:
  pull_request:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile --cwd frontend

      - name: Check Rust format
        run: cargo fmt --manifest-path engine/Cargo.toml -- --check

      - name: Clippy
        run: cargo clippy --manifest-path engine/Cargo.toml --all-targets -- -D warnings

      - name: Test Rust
        run: cargo test --manifest-path engine/Cargo.toml --all-targets

      - name: Test frontend data bridge
        run: bun run test:frontend

      - name: Build
        run: bun run build

      - name: Verify package
        run: bun run verify:package
