<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumen</title>
    <style>
      /* Cortina de carga estatica: es la MISMA cortina de entrada de Lumen Mode
         (logo + wordmark + barra + porcentaje). Vive en el HTML para pintar en
         el primer frame del webview, antes de que el bundle ejecute; cuando la
         app Svelte monta, retoma el porcentaje donde lo dejo esta cortina
         (window.__LUMEN_STATIC_INTRO__) y la conserva hasta el punch-in. */
      .lumen-static-intro {
        --lumen-static-brightness: 1;
        --lumen-static-mark-opacity: 1;
        --lumen-static-mark-scale: 1;
        --lumen-static-controls-opacity: 1;

        position: fixed;
        inset: 0;
        z-index: 200;
        display: grid;
        place-items: center;
        overflow: hidden;
        color: #effffb;
        font-family: Inter, "SF Pro Display", "Segoe UI Variable Display", "Segoe UI", system-ui, sans-serif;
        background:
          radial-gradient(ellipse at 50% 42%, rgba(0, 146, 252, 0.2), transparent 34%),
          radial-gradient(ellipse at 50% 58%, rgba(2, 10, 20, 0.9), rgba(1, 4, 9, 0.98) 70%),
          #010508;
        filter: brightness(var(--lumen-static-brightness));
      }

      .lumen-static-intro::before,
      .lumen-static-intro::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .lumen-static-intro::before {
        opacity: 0.34;
        background:
          linear-gradient(112deg, transparent 0 32%, rgba(0, 146, 252, 0.08) 46%, transparent 62%),
          repeating-linear-gradient(90deg, rgba(125, 178, 217, 0.014) 0 1px, transparent 1px 82px);
      }

      .lumen-static-intro::after {
        background: radial-gradient(ellipse at center, transparent 0 42%, rgba(0, 0, 0, 0.62) 100%);
      }

      .lumen-static-mark {
        /* El lockup no participa en el grid central: Chromium puede omitir un
           hijo del grid durante un frame mientras VS Code redimensiona Zen.
           El anclaje absoluto mantiene una caja de pintura estable. */
        position: absolute;
        left: calc(50% - 116px);
        top: calc(50% - 88px);
        z-index: 1;
        display: grid;
        grid-template-rows: 92px 40px;
        justify-items: center;
        width: 232px;
        height: 152px;
        gap: 20px;
        opacity: var(--lumen-static-mark-opacity);
        visibility: visible;
        pointer-events: none;
        transform: scale(var(--lumen-static-mark-scale));
        transform-origin: 50% 30.25%;
      }

      .lumen-static-mark::before {
        content: "";
        position: absolute;
        z-index: -1;
        left: 50%;
        top: 42%;
        width: 248px;
        aspect-ratio: 1;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(95, 200, 255, 0.24), rgba(0, 146, 252, 0.1) 38%, transparent 72%);
        transform: translate(-50%, -50%);
      }

      .lumen-static-logo {
        width: 92px;
        height: 92px;
        object-fit: contain;
      }

      .lumen-static-wordmark {
        width: auto;
        height: 40px;
        object-fit: contain;
      }

      .lumen-static-bar {
        position: absolute;
        z-index: 1;
        left: 50%;
        top: calc(50% + 104px);
        width: min(232px, calc(100vw - 96px));
        height: 4px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(54, 76, 96, 0.42);
        box-shadow:
          inset 0 1px 1px rgba(244, 252, 251, 0.12),
          0 0 24px rgba(0, 146, 252, 0.14);
        transform: translateX(-50%);
      }

      .lumen-static-bar i {
        display: block;
        width: 100%;
        height: 100%;
        border-radius: inherit;
        background:
          radial-gradient(ellipse at 72% 50%, rgba(244, 252, 251, 0.86), transparent 48%),
          linear-gradient(90deg, #0092fc, #5fc8ff);
        box-shadow:
          0 0 18px rgba(0, 146, 252, 0.5),
          inset 0 1px 1px rgba(244, 252, 251, 0.4);
        transform: scaleX(0);
        transform-origin: left center;
      }

      .lumen-static-percent {
        position: absolute;
        z-index: 1;
        left: 50%;
        top: calc(50% + 124px);
        min-width: 4ch;
        margin: 0;
        transform: translateX(-50%);
        color: rgba(239, 255, 251, 0.92);
        font-size: 14px;
        font-weight: 650;
        font-variant-numeric: tabular-nums;
        line-height: 1;
        text-align: center;
        text-shadow: 0 0 14px rgba(0, 146, 252, 0.55);
      }

      .lumen-static-bar,
      .lumen-static-percent {
        opacity: var(--lumen-static-controls-opacity);
      }

    </style>
  </head>
  <body>
      <div id="lumen-static-intro" class="lumen-static-intro" aria-hidden="true">
        <div class="lumen-static-mark">
          <img class="lumen-static-logo" src="__LUMEN_BRAND_LOGO__" alt="" width="92" height="92" decoding="sync" fetchpriority="high">
          <img class="lumen-static-wordmark" src="__LUMEN_BRAND_WORDMARK__" alt="Lumen" decoding="sync" fetchpriority="high">
        </div>
        <div class="lumen-static-bar" role="progressbar" aria-label="Cargando Lumen" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"><i id="lumen-static-fill"></i></div>
        <p class="lumen-static-percent"><span id="lumen-static-percent-value">0</span>%</p>
      </div>
      <script data-lumen-static-intro>
        (() => {
          // Progreso asintotico hacia 88%: rapido al inicio, lento en la cola.
          // El bundle real suele evaluar en 1-2s; la app Svelte retoma este
          // valor y lo completa hasta 100 con sus propias señales de listo.
          const fill = document.getElementById("lumen-static-fill");
          const value = document.getElementById("lumen-static-percent-value");
          const bar = document.querySelector(".lumen-static-bar");
          const state = { progress: 0, controlled: false };
          window.__LUMEN_STATIC_INTRO__ = state;
          if (!fill || !value) return;
          const startedAt = performance.now();

          function render() {
            if (!document.getElementById("lumen-static-fill")) return;
            const elapsed = performance.now() - startedAt;
            const progress = state.controlled
              ? state.progress
              : 88 * (1 - Math.exp(-elapsed / 1100));
            if (!state.controlled) state.progress = progress;
            fill.style.transform = "scaleX(" + (progress / 100).toFixed(4) + ")";
            value.textContent = String(Math.floor(progress));
            if (bar) bar.setAttribute("aria-valuenow", String(Math.floor(progress)));
            requestAnimationFrame(render);
          }

          requestAnimationFrame(render);
        })();
      </script>
    <div id="app">
      <main class="lumen-route-app" style="--theme-core:#00c991;--theme-edge:#21f6d2;--theme-glow:#00ffe0;--theme-accent:#eafffb;--snake-tint-strength:0;--node-tint:none">
        <div class="stage-viewport" style="width:100vw;height:100vh">
          <section
            class="route-stage"
            aria-label="Ruta C, modulo 2: Cadenas de caracteres"
            style="--stage-scale:0.56;--layout-width:1086px;--content-offset:0px"
          >
            <div class="background-layer"></div>
            <header class="route-header">
              <button class="glass-pill back-pill" type="button" aria-label="Volver a Ruta C">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M15.5 4.5 8 12l7.5 7.5"></path>
                  <path d="M8.5 12H20"></path>
                </svg>
                <span>Ruta C</span>
              </button>
              <div class="title-block">
                <p>MODULO 2</p>
                <h1>Cadenas de caracteres</h1>
                <span>char, strings y texto</span>
              </div>
              <button class="glass-pill modules-pill" type="button" aria-label="Ver modulos">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <circle cx="5" cy="6" r="1.5"></circle>
                  <circle cx="5" cy="12" r="1.5"></circle>
                  <circle cx="5" cy="18" r="1.5"></circle>
                  <path d="M10 6h9M10 12h9M10 18h9"></path>
                </svg>
                <span>Modulos</span>
              </button>
            </header>
          </section>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
